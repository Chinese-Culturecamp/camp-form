<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>资料确认 · 寻昔纪远</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Serif SC', serif;
      background-color: #c8a96e;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(180,130,70,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(120,80,40,0.3) 0%, transparent 60%);
      min-height: 100vh;
      padding: 32px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .card {
      background: rgba(245,230,195,0.92);
      border-radius: 4px;
      padding: 32px 28px;
      max-width: 480px;
      width: 100%;
      border: 1.5px solid rgba(120,70,30,0.25);
      box-shadow: 0 4px 24px rgba(80,40,10,0.18);
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 6px; left: 6px; right: 6px; bottom: 6px;
      border: 0.5px solid rgba(140,80,30,0.2);
      border-radius: 2px;
      pointer-events: none;
    }
    .header { text-align: center; margin-bottom: 24px; }
    .camp-sub { font-size: 11px; color: #8b5e3c; letter-spacing: 2px; margin-bottom: 6px; }
    h2 { font-size: 20px; font-weight: 700; color: #5c2d0e; line-height: 1.5; margin-bottom: 6px; }
    .ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin: 10px 0 16px; color: #9e6030;
      font-size: 12px; letter-spacing: 3px;
    }
    .ornament::before, .ornament::after {
      content: ''; flex: 1; max-width: 60px;
      height: 0.5px; background: #9e6030;
    }
    .sub { font-size: 13px; color: #7a4e2d; text-align: center; line-height: 1.7; margin-bottom: 20px; }
    .banner {
      background: rgba(255,240,180,0.7); border: 1px solid #c8963c;
      border-radius: 4px; padding: 10px 14px; font-size: 12px;
      color: #7d4e00; margin-bottom: 16px; line-height: 1.6; display: none;
    }
    .field { margin-bottom: 14px; }
    label { display: block; font-size: 11px; color: #9e6030; margin-bottom: 4px; letter-spacing: 1px; }
    input {
      width: 100%; padding: 9px 12px;
      border: 1px solid rgba(140,80,30,0.35); border-radius: 3px;
      font-size: 14px; font-family: 'Noto Serif SC', serif;
      outline: none; background: rgba(255,248,235,0.8);
      color: #3d1f0a; transition: border 0.2s, background 0.2s;
    }
    input:focus { border-color: #8b4513; background: rgba(255,252,242,0.95); }
    input.changed { border-color: #c8963c; background: rgba(255,245,200,0.8); }
    input.readonly { background: rgba(200,185,160,0.4); color: #7a5c3a; cursor: not-allowed; }
    .divider { border: none; border-top: 0.5px solid rgba(140,80,30,0.25); margin: 22px 0; }
    .btn {
      width: 100%; padding: 13px; background: #7a2d0e;
      color: #f5e6c8; border: none; border-radius: 3px;
      font-size: 15px; font-weight: 600; font-family: 'Noto Serif SC', serif;
      cursor: pointer; letter-spacing: 1px; transition: background 0.2s;
    }
    .btn:hover { background: #5c2008; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .footer-note { font-size: 11px; color: #9e7050; text-align: center; margin-top: 18px; line-height: 1.6; }
    #loading { text-align: center; color: #7a4e2d; font-size: 14px; padding: 40px 0; }
    #success-page { display: none; text-align: center; }
    #success-page .icon {
      width: 56px; height: 56px; background: rgba(122,45,14,0.12);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 24px; color: #7a2d0e;
      border: 1px solid rgba(122,45,14,0.25);
    }
    #success-page h1 { font-size: 20px; font-weight: 700; color: #5c2d0e; line-height: 1.5; margin-bottom: 4px; }
    #success-page p { font-size: 14px; color: #5c3a1e; line-height: 1.9; margin-bottom: 8px; }
    .quote {
      font-size: 12px; color: #9e7050; line-height: 2;
      margin-top: 20px; padding-top: 18px;
      border-top: 0.5px solid rgba(140,80,30,0.2);
    }
    .badge {
      display: inline-block; margin-top: 20px;
      background: rgba(122,45,14,0.1); color: #7a2d0e;
      font-size: 12px; padding: 6px 20px; border-radius: 2px;
      font-weight: 600; letter-spacing: 2px;
      border: 0.5px solid rgba(122,45,14,0.3);
    }
    .group-btn {
      display: block; margin-top: 12px;
      background: #7a2d0e; color: #f5e6c8;
      font-size: 13px; padding: 12px 20px;
      border-radius: 3px; font-weight: 600;
      letter-spacing: 1px; text-decoration: none;
      font-family: 'Noto Serif SC', serif;
    }
    .group-btn:hover { background: #5c2008; }
    .no-link { font-size: 12px; color: #9e7050; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">载入中……</div>

    <div id="form-page" style="display:none;">
      <div class="header">
        <p class="camp-sub">第廿三届全国中学生</p>
        <h2>杨靖耀中华文化营</h2>
        <div class="ornament">寻昔纪远</div>
        <p class="sub">请核对以下个人资料是否正确。<br/>如有错误，请直接修改后提交。</p>
      </div>
      <div class="banner" id="confirmedBanner"></div>
      <div id="fields"></div>
      <hr class="divider"/>
      <button class="btn" id="submitBtn" onclick="submitForm()">确认资料无误 · 提交</button>
      <p class="footer-note">如有疑问，欢迎联络主办方。</p>
    </div>

    <div id="success-page">
      <div class="icon">✓</div>
      <p class="camp-sub">第廿三届全国中学生</p>
      <h1>杨靖耀中华文化营</h1>
      <div class="ornament">寻昔纪远</div>
      <p>你的资料已成功确认。<br/>我们已收到你的提交，谢谢你的配合。</p>
      <p class="quote">每一份资料，都是我们为你铺好的路；<br/>每一次确认，都是旅程开始前的轻声准备。</p>
      <div class="badge">期待与你相见</div>
      <div id="groupBtnContainer"></div>
    </div>
  </div>

  <script>
    const FIELDS = [
      { key: "chinese_name",   label: "中文名",               editable: true  },
      { key: "english_name",   label: "English Name",         editable: true  },
      { key: "ic",             label: "身份证号码",             editable: false },
      { key: "contact",        label: "联络号码（WhatsApp）",   editable: true  },
      { key: "school",         label: "学校名称",              editable: true  },
      { key: "tshirt",         label: "营衣尺寸",              editable: true  },
      { key: "meal",           label: "膳食需求",              editable: true  },
      { key: "health",         label: "健康状况",              editable: true  },
      { key: "transport",      label: "往返交通方式",           editable: true  },
      { key: "emergency_name", label: "紧急联系人姓名",         editable: true  },
      { key: "emergency_num",  label: "紧急联系人联络号码",      editable: true  },
    ];

    const changedFields = {};
    let camperData = {};
    const userId = new URLSearchParams(window.location.search).get("id");

    async function loadData() {
      if (!userId) {
        document.getElementById("loading").textContent = "无效链接，请联络主办方。";
        return;
      }
      try {
        const res = await fetch(`/.netlify/functions/getamper?id=${userId}`);
        const json = await res.json();
        if (!res.ok) {
          document.getElementById("loading").textContent = json.error || "找不到资料，请联络主办方。";
          return;
        }
        camperData = json.data;
        renderForm();
      } catch (err) {
        document.getElementById("loading").textContent = "载入失败，请重试。";
      }
    }

    function renderForm() {
      document.getElementById("loading").style.display = "none";
      document.getElementById("form-page").style.display = "block";

      if (camperData.confirmed === "confirmed") {
        const banner = document.getElementById("confirmedBanner");
        banner.style.display = "block";
        banner.textContent = `你已于 ${camperData.confirmedTime} 确认过资料。如需修改，请直接编辑并重新提交。`;
      }

      const container = document.getElementById("fields");
      FIELDS.forEach(f => {
        const val = camperData[f.key] || "";
        const div = document.createElement("div");
        div.className = "field";
        div.innerHTML = `
          <label>${f.label}</label>
          <input type="text" id="${f.key}" value="${val}" data-original="${val}"
            ${f.editable ? `oninput="markChanged(this, '${f.key}')"` : `readonly class="readonly"`}
          />`;
        container.appendChild(div);
      });
    }

    function markChanged(el, key) {
      if (el.value !== el.dataset.original) {
        el.classList.add("changed");
        changedFields[key] = true;
      } else {
        el.classList.remove("changed");
        delete changedFields[key];
      }
    }

    async function submitForm() {
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "提交中……";

      const payload = { userId, changedFields: Object.keys(changedFields) };
      FIELDS.forEach(f => {
        payload[f.key] = document.getElementById(f.key)?.value || "";
      });

      try {
        const res = await fetch("/.netlify/functions/submitcamper", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const json = await res.json();

        if (res.ok && json.success) {
          document.getElementById("form-page").style.display = "none";
          document.getElementById("success-page").style.display = "block";

          const container = document.getElementById("groupBtnContainer");
          if (json.groupLink) {
            container.innerHTML = `<a href="${json.groupLink}" target="_blank" class="group-btn">加入「${json.groupName}」群组</a>`;
          } else if (json.groupName) {
            container.innerHTML = `<p class="no-link">群组链接尚未开放，请稍后联络主办方。</p>`;
          } else {
            container.innerHTML = `<p class="no-link">组别未分配，请联络主办方。</p>`;
          }
        } else {
          btn.disabled = false;
          btn.textContent = "确认资料无误 · 提交";
          alert("提交失败，请重试或联络主办方。");
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "确认资料无误 · 提交";
        alert("提交失败，请重试或联络主办方。");
      }
    }

    loadData();
  </script>
</body>
</html>
